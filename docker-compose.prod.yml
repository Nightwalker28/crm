name: lynk-crm

x-backend-env: &backend-env
  env_file:
    - ${LYNK_ENV_FILE:-.env.production}
  environment:
    IO_SEARCH_UPLOAD_DIR: /app/uploads/io-search
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  backend:
    <<: *backend-env
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: lynk-crm-backend:prod
    restart: unless-stopped
    ports:
      - "${BACKEND_BIND:-127.0.0.1:8000}:8000"
    volumes:
      - lynk_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  celery-worker:
    <<: *backend-env
    image: lynk-crm-backend:prod
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - lynk_uploads:/app/uploads
    depends_on:
      backend:
        condition: service_healthy

  celery-beat:
    <<: *backend-env
    image: lynk-crm-backend:prod
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    volumes:
      - lynk_uploads:/app/uploads
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    image: lynk-crm-frontend:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    ports:
      - "${FRONTEND_BIND:-127.0.0.1:3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  lynk_uploads:
