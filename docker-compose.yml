services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh /app/start.sh
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./backend/${IO_SEARCH_UPLOAD_DIR:-uploads/io-search}:/app/${IO_SEARCH_UPLOAD_DIR:-uploads/io-search}
    ports:
      - "8000:8000"
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  frontend-e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /app
    network_mode: host
    env_file:
      - .env
    environment:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
    depends_on:
      - frontend

  database:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
